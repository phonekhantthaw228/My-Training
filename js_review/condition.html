<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Condition</h1>

<script>

        let num = prompt(" Enter a number "); 

        if(num > 90 ){
            document.write("This number is invalid being greater than 90");
        }else if( num==90){
            document.write("This is unexpectedly equal to 90");
        }else {
            document.write("This number is invalid being less than 90");
        }

</script>
</body>
</html>
